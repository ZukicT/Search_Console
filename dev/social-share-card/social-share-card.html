<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=720, initial-scale=1">
  <title>Search Console for iOS - Social Share Card (dev only)</title>
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="googlebot" content="noindex, nofollow">
  <meta name="description" content="Local marketing capture frame. Not deployed to search-console.org.">
  <link rel="icon" type="image/png" href="../../docs/favicon-32x32.png">
  <link rel="stylesheet" href="../../docs/css/marketing-social-card.css?v=10">
  <script>
    if (location.search.indexOf('capture=1') !== -1) {
      document.documentElement.setAttribute('data-capture', 'true');
    }
  </script>
</head>
<body>
  <div class="capture-toolbar">
    <p class="capture-hint">Dev only. Not on live site. Square card 720 x 720. Use ?capture=1 to hide this bar.</p>
    <div class="capture-export-actions">
      <button type="button" class="capture-export-btn" id="download-jpeg-btn">Download JPEG</button>
      <button type="button" class="capture-export-btn capture-export-btn--secondary" id="download-webp-btn">Download WebP</button>
      <button type="button" class="capture-export-btn capture-export-btn--secondary" id="download-gif-btn">Download GIF</button>
    </div>
    <p class="capture-export-status" id="export-status" hidden></p>
  </div>

  <article class="social-card" id="social-share-card" aria-label="Search Console for iOS marketing card">
    <section class="hero hero-chapter hero--home social-card__hero" aria-labelledby="hero-heading">
      <div class="hero-dot-wave-wrap" data-hero-dot-wave data-hero-dot-wave-immediate aria-hidden="true"></div>

      <div class="hero-chapter__inner social-card__hero-inner">
        <div class="hero-chapter__content">
          <div class="hero-app-mark" aria-hidden="true">
            <span class="hero-app-mark__bounce">
              <span class="hero-app-mark__coin">
                <img src="../../docs/Bot-144.png" alt="" width="72" height="72">
              </span>
            </span>
          </div>

          <div class="hero-identity">
            <p class="hero-pill availability-pill">Version 2.0</p>
            <h1 id="hero-heading">See how your site performs in search</h1>
            <p class="hero-role">Same account. Same data. Built for iPhone.</p>
          </div>

          <div class="hero-actions">
            <span class="btn btn-primary">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
              </svg>
              <span>Download on the App Store</span>
            </span>
          </div>

          <p class="social-card__url">search-console.org</p>
        </div>
      </div>
    </section>
  </article>

  <script src="../../docs/js/hero-dot-wave.js?v=28"></script>
  <script type="module" src="../../docs/js/marketing-social-card-export.js?v=2"></script>
</body>
</html>
